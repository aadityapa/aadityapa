name: SVG Optimization Check

on:
  push:
    branches:
      - main
    paths:
      - "assets/**.svg"
      - "favicon.svg"
      - ".svgo.config.mjs"
      - ".github/workflows/optimize-svg.yml"
  pull_request:
    paths:
      - "assets/**.svg"
      - "favicon.svg"
      - ".svgo.config.mjs"
      - ".github/workflows/optimize-svg.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  svgo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install SVGO
        run: npm install --no-save svgo@3

      - name: Dry-run SVGO with SMIL-safe config
        run: |
          for f in assets/*.svg favicon.svg; do
            before=$(stat -c%s "$f")
            npx svgo --config .svgo.config.mjs -i "$f" -o "/tmp/$(basename "$f")"
            after=$(stat -c%s "/tmp/$(basename "$f")")
            echo "$f: $before -> $after bytes"
          done

      - name: Verify SMIL animations survived optimization
        run: |
          python3 - <<'EOF'
          import glob, os, sys
          fail = 0
          # Every shipped SVG is animated; compare each optimized copy in /tmp
          # against its source so no SVGO pass can silently strip SMIL.
          for src_path in sorted(glob.glob("assets/*.svg") + ["favicon.svg"]):
              name = os.path.basename(src_path)
              opt = open(f"/tmp/{name}", encoding="utf-8").read()
              src = open(src_path, encoding="utf-8").read()
              for tag in ("<animate", "<animateTransform", "<animateMotion"):
                  if tag in src and tag not in opt:
                      print(f"::error::{name} lost {tag} elements during optimization")
                      fail = 1
              if "<animate" not in opt:
                  print(f"::error::{name} has no SMIL animations after optimization")
                  fail = 1
              print(f"{name}: SMIL intact")
          sys.exit(fail)
          EOF
