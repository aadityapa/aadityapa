name: Markdown Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            docs/**/*.md
            reports/**/*.md
