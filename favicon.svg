<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="ft fd">
<title id="ft">AP - Aaditya Padiya monogram</title>
<desc id="fd">Animated monogram favicon with the letters AP on a dark rounded tile, stroked by a rotating violet-cyan-emerald accent gradient.</desc>
<defs>
<linearGradient id="fag" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="64" y2="64">
<stop offset="0" stop-color="#7C3AED"/>
<stop offset="0.5" stop-color="#22D3EE"/>
<stop offset="1" stop-color="#10B981"/>
<animateTransform attributeName="gradientTransform" type="rotate" from="0 32 32" to="360 32 32" dur="8s" repeatCount="indefinite"/>
</linearGradient>
<filter id="fgl" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="1.6" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#030712"/>
<rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="none" stroke="url(#fag)" stroke-width="2"/>
<g filter="url(#fgl)">
<text x="32" y="43" font-family="'Segoe UI',-apple-system,Arial,sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="url(#fag)" letter-spacing="1">AP</text>
</g>
<circle cx="51" cy="14" r="2.4" fill="#22D3EE">
<animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/>
</circle>
</svg>
